<!DOCTYPE html>
<html lang="en" dir="ltr" x-data="posApp()" :class="{'dark': darkMode}" :dir="rtl ? 'rtl' : 'ltr'">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional POS Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">

    <div id="pos-interface" class="flex h-screen overflow-hidden bg-gray-50 dark:bg-gray-950">
        
        <aside :class="sidebarOpen ? 'w-64' : 'w-0 overflow-hidden border-none'"
            class="hidden lg:flex flex-col bg-white dark:bg-gray-800 border-e border-gray-200 dark:border-gray-700 transition-all duration-300 shadow-xl z-50">
            <div class="flex items-center h-16 px-6 border-b border-gray-200 dark:border-gray-700">
                <span class="font-bold text-xl tracking-tight text-blue-600">PRO-ERP</span>
            </div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-1">
                <a href="#" class="flex items-center px-3 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <span class="mx-3 font-medium">Back to Office</span>
                </a>
                <div class="pt-4 pb-2 text-xs font-semibold text-gray-400 uppercase">Categories</div>
                <button class="w-full flex items-center px-3 py-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-500/20">
                    <span class="mx-3 font-medium">All Products</span>
                </button>
                </nav>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">
            
            <header class="h-16 flex items-center justify-between px-6 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm z-40">
                <div class="flex items-center gap-4">
                    <button @click="sidebarOpen = !sidebarOpen" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" /></svg>
                    </button>
                    <div class="relative hidden md:block">
                        <input type="text" placeholder="Search product barcode..." class="bg-gray-100 dark:bg-gray-700 border-none rounded-full px-10 py-2 text-sm w-64 focus:ring-2 ring-blue-500">
                        <svg class="w-4 h-4 absolute left-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                </div>

                <div class="flex items-center gap-2 lg:gap-4">
                    <button @click="toggleFullScreen()" class="flex items-center gap-2 px-3 py-2 bg-gray-100 dark:bg-gray-700 hover:bg-blue-600 hover:text-white rounded-lg transition-all font-medium text-sm">
                        <svg x-show="!isFullScreen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                        <svg x-show="isFullScreen" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                        <span class="hidden sm:inline" x-text="isFullScreen ? 'Exit Full' : 'Full Screen'"></span>
                    </button>

                    <button @click="darkMode = !darkMode" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full">
                        <svg x-show="!darkMode" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" /></svg>
                        <svg x-show="darkMode" class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" /></svg>
                    </button>
                </div>
            </header>

            <main class="flex-1 flex overflow-hidden">
                
                <section class="flex-1 overflow-y-auto p-4 custom-scroll">
                    <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4">
                        <template x-for="i in 12" :key="i">
                            <div class="group bg-white dark:bg-gray-800 p-3 rounded-2xl border border-gray-200 dark:border-gray-700 hover:shadow-xl transition-all cursor-pointer">
                                <div class="aspect-square bg-gray-50 dark:bg-gray-900 rounded-xl mb-3 flex items-center justify-center relative overflow-hidden">
                                    <svg class="w-12 h-12 text-gray-200" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z" /></svg>
                                    <div class="absolute inset-0 bg-blue-600/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                </div>
                                <h4 class="font-bold text-sm truncate">Premium Product <span x-text="i"></span></h4>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-blue-600 font-extrabold">$29.99</span>
                                    <span class="text-[10px] bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded text-gray-500 uppercase font-bold">In Stock</span>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>

                <section class="w-96 bg-white dark:bg-gray-800 border-s border-gray-200 dark:border-gray-700 flex flex-col shadow-2xl z-10">
                    <div class="p-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                        <span class="font-bold">Current Order</span>
                        <button class="text-red-500 text-xs font-bold hover:underline">Clear All</button>
                    </div>
                    
                    <div class="flex-1 overflow-y-auto p-4 space-y-4 custom-scroll">
                        <div class="flex gap-3">
                            <div class="w-12 h-12 bg-gray-100 dark:bg-gray-700 rounded-lg flex-shrink-0"></div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-bold truncate">Premium Arabica Coffee</p>
                                <div class="flex items-center gap-2 mt-1">
                                    <button class="w-6 h-6 rounded border border-gray-300 flex items-center justify-center">-</button>
                                    <span class="text-sm font-bold w-4 text-center">2</span>
                                    <button class="w-6 h-6 rounded border border-gray-300 flex items-center justify-center">+</button>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-bold">$14.00</p>
                            </div>
                        </div>
                        </div>

                    <div class="p-6 border-t border-gray-100 dark:border-gray-700 space-y-3 bg-gray-50 dark:bg-gray-900/30">
                        <div class="flex justify-between text-gray-500 text-sm">
                            <span>Subtotal</span>
                            <span>$14.00</span>
                        </div>
                        <div class="flex justify-between text-gray-500 text-sm">
                            <span>Tax (5%)</span>
                            <span>$0.70</span>
                        </div>
                        <div class="flex justify-between font-bold text-2xl pt-2 border-t border-dashed border-gray-300 dark:border-gray-600">
                            <span>Total</span>
                            <span class="text-blue-600">$14.70</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3 mt-4">
                            <button class="py-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl font-bold hover:bg-gray-100 dark:hover:bg-gray-700 transition">Hold</button>
                            <button class="py-3 border-2 border-gray-200 dark:border-gray-700 rounded-xl font-bold hover:bg-gray-100 dark:hover:bg-gray-700 transition">Discount</button>
                        </div>
                        <button class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-black text-xl shadow-lg shadow-green-500/30 transition-all active:scale-[0.98]">
                            PAY NOW
                        </button>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        function posApp() {
            return {
                darkMode: false,
                rtl: false,
                sidebarOpen: true,
                isFullScreen: false,
                
                toggleFullScreen() {
                    let elem = document.documentElement; // Or document.getElementById('pos-interface')
                    
                    if (!document.fullscreenElement) {
                        if (elem.requestFullscreen) {
                            elem.requestFullscreen();
                        } else if (elem.webkitRequestFullscreen) { /* Safari */
                            elem.webkitRequestFullscreen();
                        } else if (elem.msRequestFullscreen) { /* IE11 */
                            elem.msRequestFullscreen();
                        }
                        this.isFullScreen = true;
                    } else {
                        if (document.exitFullscreen) {
                            document.exitFullscreen();
                        }
                        this.isFullScreen = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
